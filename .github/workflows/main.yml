name: Despertador del Museo
on:
  schedule:
    - cron: '0 * * * *' # Esto se ejecuta automáticamente cada hora
  workflow_dispatch:   # Esto te permite probarlo a mano si querés

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Visitar la App
        # REEMPLAZA EL LINK DE ABAJO POR TU LINK DE STREAMLIT REAL
        run: curl -I https://calendario2026-museodelhambre.streamlit.app/
